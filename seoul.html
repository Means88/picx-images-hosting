      <script>
        var imageBox = document.getElementById("imgbox");
        var descBox = $("#descbox");
        var wrapper = $("#exif-wrapper");
        var exifParam = $("#exif-param");
        var exifMaker = $("#exif-maker");
        var exifDate = $("#exif-date");
        var exifLens = $("#exif-lens");
        var exifLogo = $("#exif-maker-logo");
        var exifAuthor = $("#exif-author");
        var normalWrapper = $("#normal-wrapper");
        var normalData = $("#no-exif-data");
        var name = getParam('name');
        var editor = $("#editor");
        imgno = 0;
        imgLink = imageBox.src;
        function changeExifData(v) {
          if (Object.keys(v.exif_data).length === 0) {
            wrapper.hide();
            normalWrapper.show();
            normalData.text("Shot By " + "Means88");
          } else {
            wrapper.show();
            normalWrapper.hide();
            wrapperData(v, "Means88");
          }
        }

        function changeImageWith(target) {
          imgno = target.getAttribute('id');
          imgLink = target.getAttribute('rel');
          name = target.getAttribute('name');
          var desc = target.getAttribute('desc');
          var thum = target.getAttribute('data-src');
          var video = target.getAttribute('video');
          var v = JSON.parse(target.getAttribute('extra'));
          imageBox.src = thum;
          imageBox.classList.add('blur');
          const highResImage = new Image();
          highResImage.src = imgLink;
          highResImage.onload = function() {
            imageBox.src = highResImage.src;
            imageBox.classList.remove('blur');
            // preload next image into browser cache
            var nextIdx = Number(imgno) + 1;
            if (nextIdx < len) {
              var nextEl = document.getElementById(nextIdx);
              if (nextEl) {
                var prefetch = new Image();
                prefetch.src = nextEl.getAttribute('rel');
              }
            }
          };
          imageBox.setAttribute("share", target.getAttribute('share'));
          var imageFancy = imageBox.parentElement;
          imageFancy.setAttribute("href", imgLink);

          var picg = document.getElementById('pic-g');
          attachLivePhoto(picg, false, '');
          attachLivePhoto(picg, video !== '', video);
          // keep the HDR fullscreen viewer in sync when navigating (arrow keys)
          var albumViewer = document.getElementById('album-viewer');
          if (albumViewer && !albumViewer.hidden) {
            var avImgEl = document.getElementById('av-img');
            if (avImgEl) avImgEl.src = imgLink;
          }
          target.scrollIntoView({ behavior: "smooth", block: "end", inline: "nearest" })
          descBox.text(imgno.desc);
          imageBox.title = desc;
          changeExifData(v);
          updateParams(name);
        }
        function cheangeImageInSelector() {
          changeImageWith(document.getElementById(imgno))
        }
        function changeimg() {
          changeImageWith(event.target)
        };
        function changeImageWithName(name) {
          var value = $(`[name='${name}']`)[0];
          changeImageWith(value)
        };
        const len = +'9'
        if (name !== "" && name !== null && name !== 'null') {
          changeImageWithName(name)
        } else {
          var value = $(`#0`)[0];
          name = value.getAttribute('name');
          imgLink = value.getAttribute('rel');
          imageBox.title = value.getAttribute('desc');
          var v = JSON.parse(value.getAttribute('extra'));
          changeExifData(v);
          imageBox.setAttribute("share", value.getAttribute('share'));
          // progressively load full-res for initial image without blur flash
          const initHighRes = new Image();
          initHighRes.src = imgLink;
          initHighRes.onload = function() {
            imageBox.src = initHighRes.src;
            // preload second image
            var nextEl = document.getElementById(1);
            if (nextEl) {
              var prefetch = new Image();
              prefetch.src = nextEl.getAttribute('rel');
            }
          };
        }

        $('#download').click(function () {
          var node = document.getElementById('all-pic');
          html2canvas(node, {
            useCORS: true,
            allowTaint: true,
            scrollX: 0,
            scrollY: 0,
          }).then(function (canvas) {
            simulateDownloadImageClick(canvas.toDataURL('image/png'),  name + '.png');
          });
        });
        editor.click(function () {
          window.open('https://photo.means88.com/editor?file=' + encodeURIComponent(imgLink));
        })
        // key
        window.onkeydown = function album_hotkey() {
          //[键盘快捷键] 左箭头 上一张
          if (event.keyCode === 37) {
            imgno = imgno - 1;
            if (imgno < 0) {
              imgno = 0;
            }
            cheangeImageInSelector();
          };
          //[键盘快捷键] 右箭头 下一张
          if (event.keyCode === 39) {
            imgcount = len - 1
            imgno = Number(imgno) + 1;
            if (imgno > imgcount) {
              imgno = imgcount
            }
            imgno = Number(imgno)
            console.log(imgno)
            cheangeImageInSelector();
          };
          //[键盘快捷键] 上箭头 恢复到第一张
          if (event.keyCode === 38) {
            imgno = 0;
            cheangeImageInSelector();
          };
        };
        $("#share").on('click', function() {
          var imageBox = document.getElementById("imgbox");
          copyToClipboard('https://photo.means88.com/' + "photo?name=" + imageBox.getAttribute('share'));
        });
        $("#grid").on('click', function() {
          window.open('/grid-all?album=' + encodeURIComponent('seoul'));
        });

        // HDR-safe fullscreen viewer for the main album image.
        // Fancybox applies a transform (pan/zoom) and opacity/scale open animations
        // to its lightbox image, which forces the browser to composite it through an
        // intermediate buffer and tone-map HDR (gain-map) photos down to SDR.
        // This viewer shows a plain <img> with no transform/filter/opacity, so the
        // browser keeps the photo's HDR headroom — matching the inline display.
        (function () {
          var viewer = document.getElementById('album-viewer');
          var avImg = document.getElementById('av-img');
          var avStage = document.getElementById('av-stage');
          if (!viewer || !avImg) return;
          function openViewer() {
            avImg.src = imgLink;
            viewer.hidden = false;
            viewer.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
          }
          function closeViewer() {
            viewer.hidden = true;
            viewer.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            avImg.removeAttribute('src');
          }
          imageBox.style.cursor = 'zoom-in';
          imageBox.addEventListener('click', openViewer);
          viewer.addEventListener('click', function (e) {
            if (e.target === viewer || e.target === avStage) closeViewer();
          });
          var closeBtn = viewer.querySelector('.av-close');
          if (closeBtn) closeBtn.addEventListener('click', closeViewer);
          document.addEventListener('keydown', function (e) {
            if (viewer.hidden) return;
            if (e.key === 'Escape') closeViewer();
          });
        })();
      </script>
